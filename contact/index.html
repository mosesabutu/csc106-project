<!doctype html>
<html lang="en">
  <head>
    <meta name="theme-color" content="#000000" />
    <link
      rel="icon"
      type="image/png"
      href="/my-favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/my-favicon/favicon.svg" />
    <link rel="shortcut icon" href="/my-favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/my-favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Moses.OS" />
    <link rel="manifest" href="/my-favicon/site.webmanifest" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Initialize Secure Handshake</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .form-group {
        margin-bottom: 1.5rem;
      }
      .error-msg {
        color: var(--error);
        font-size: 0.85rem;
        margin-top: 0.25rem;
        min-height: 1.2rem;
      }
      .form-control {
        width: 100%;
        padding: 0.75rem;
        background: var(--bg-secondary);
        border: 1px solid #334155;
        border-radius: 6px;
        color: white;
      }
    </style>
  </head>
  <body>
    <main class="main-content" style="max-width: 600px">
      <h2 style="margin-bottom: 2rem">Initialize Secure Handshake</h2>
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" class="form-control" />
          <div id="name-error" class="error-msg"></div>
        </div>
        <div class="form-group">
          <label>E-Mail Address Link</label>
          <input type="email" id="email" class="form-control" />
          <div id="email-error" class="error-msg"></div>
        </div>
        <div class="form-group">
          <label>Telephony Register</label>
          <input type="text" id="phone" class="form-control" />
          <div id="phone-error" class="error-msg"></div>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="message" class="form-control" rows="5"></textarea>
          <div id="message-error" class="error-msg"></div>
        </div>
        <button
          type="submit"
          style="
            width: 100%;
            padding: 1rem;
            background: var(--accent-primary);
            border: none;
            border-radius: 6px;
            color: var(--bg-primary);
            font-weight: bold;
            cursor: pointer;
          "
        >
          Send secure message
        </button>
      </form>
    </main>

    <script src="/js/main.js" type="module"></script>
    <script src="/js/contact.js" type="module"></script>
  </body>
</html>
